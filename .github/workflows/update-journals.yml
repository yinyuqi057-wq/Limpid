name: Fetch Journal Data

# 每天北京时间 8:00 和 20:00 自动抓取文献数据
# UTC 0:00 = 北京时间 8:00, UTC 12:00 = 北京时间 20:00
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-journals
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch journal data
        run: node scripts/fetch-journals.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/journals.json
          if git diff --staged --quiet; then
            echo "No changes in journal data."
          else
            git commit -m "📚 Auto-update journal data [skip ci]"
            git push
            echo "Journal data updated and pushed!"
          fi
